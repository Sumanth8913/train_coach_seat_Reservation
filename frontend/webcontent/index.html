<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Login</title>

<link rel="stylesheet" href="UserHome_Css.css">

<!-- ✅ Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

    body {
        background: linear-gradient(135deg, #0f172a, #1e293b);
    }

    .login-box {
        width: 400px;
        margin: auto;
        margin-top: 60px;
        padding: 25px;
        border-radius: 15px;
        background-color: white;
    }

    footer {
        margin-top: 40px;
        text-align: center;
        color: white;
    }

</style>

</head>

<body class="container">

<header>

    <h1 class="hd">National Ticket Booking Spot</h1>

    <div class="home"><p class="menu"><a href="index.html">Home</a></p></div>
    <div class="home"><p class="menu"><a href="UserViewTrains.html">View Trains</a></p></div>
    <div class="home"><p class="menu"><a href="TrainBwStn.html">Trains Between Stations</a></p></div>
    <div class="home"><p class="menu"><a href="Availability.html">Seat Availability</a></p></div>
    <div class="home"><p class="menu"><a href="Fare.html">Fare Enquiry</a></p></div>
    <div class="home"><p class="menu"><a href="SearchTrains.html">Search Train</a></p></div>

</header>

<div class="card shadow login-box">

    <h3 class="text-center mb-3">👤 User Login</h3>

    <div class="mb-3">
        <label>Email</label>
        <input type="text" id="uname" class="form-control" placeholder="Enter Email">
    </div>

    <div class="mb-3">
        <label>Password</label>
        <input type="password" id="pword" class="form-control" placeholder="Enter Password">
    </div>

    <button class="btn btn-primary w-100" onclick="userLogin()">
        LOGIN 😏🔥
    </button>

</div>

<footer>
    <address>
        Contact: Suram Sumanth <br>
        Email: suramsumanth77@gmail.com <br>
        Phone: 630379106
    </address>
</footer>

<script>

function userLogin() {

    const uname = document.getElementById("uname").value;
    const pword = document.getElementById("pword").value;

    if (!uname || !pword) {
        alert("Fill all fields mama 😌");
        return;
    }

    fetch("http://127.0.0.1:5000/user_login", {

        method: "POST",

        headers: {
            "Content-Type": "application/json"
        },

        body: JSON.stringify({
            uname: uname,
            pword: pword
        })

    })
    .then(res => res.json())
    .then(response => {

        if (response.status === "success") {

            window.location.href = "UserHome.html";

        } else {

            alert("Invalid credentials 😭");

        }

    })
    .catch(err => {

        alert("Backend broke mama 😭");
        console.log(err);

    });
}

</script>

</body>
</html>
