<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Book Trains</title>

<link rel="stylesheet" href="UserHome_Css.css">

<!-- ✅ Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

    body {
        background: linear-gradient(135deg, #0f172a, #1e293b);
    }

    .booking-box {
        width: 420px;
        margin: auto;
        margin-top: 60px;
        padding: 25px;
        border-radius: 15px;
        background-color: white;
    }

</style>

</head>

<body class="container">

<header>

    <h1 class="hd">National Ticket Booking Spot</h1>

    <div class="home"><p class="menu"><a href="UserHome.html">Home</a></p></div>
    <div class="home"><p class="menu"><a href="UserViewTrains.html">View Trains</a></p></div>
    <div class="home"><p class="menu"><a href="TrainBwStn.html">Trains Between Stations</a></p></div>
    <div class="home"><p class="menu"><a href="Availability.html">Seat Availability</a></p></div>
    <div class="home"><p class="menu"><a href="SearchTrains.html">Search Train</a></p></div>
    <div class="home"><p class="menu"><a href="Fare.html">Fare Enquiry</a></p></div>
    <div class="home"><p class="menu"><a href="Payment.html">Payment</a></p></div>
    <div class="home"><p class="menu"><a href="index.html">Logout</a></p></div>

</header>

<div class="card shadow booking-box">

    <h3 class="text-center mb-3">🚆 Train Booking</h3>

    <div class="mb-3">
        <label>Train Number</label>
        <input type="text" id="trainnumber" class="form-control">
    </div>

    <div class="mb-3">
        <label>No of Seats</label>
        <input type="number" id="seats" class="form-control">
    </div>

    <button class="btn btn-primary w-100" onclick="bookSeats()">
        Book Now 😏🔥
    </button>

</div>

<div class="container mt-4">
    <div id="result" style="display:none;"></div>
</div>

<script>

function bookSeats() {

    const trainnumber = document.getElementById("trainnumber").value;
    const seats = document.getElementById("seats").value;

    if (!trainnumber || !seats) {
        alert("Fill all fields mama 😌");
        return;
    }

    fetch("http://127.0.0.1:5000/book", {

        method: "POST",

        headers: {
            "Content-Type": "application/json"
        },

        body: JSON.stringify({
            trainnumber: trainnumber,
            seats: seats
        })

    })
    .then(response => response.json())
    .then(data => {

        const resultDiv = document.getElementById("result");

        resultDiv.style.display = "block";

        if (!data.allocated_seats || data.allocated_seats.length === 0) {

            resultDiv.innerHTML =
                "<div class='alert alert-danger'>Seats Not Available 😭</div>";

        } else {

            resultDiv.innerHTML =
                `<div class='alert alert-success'>
                    Seats Allocated 😌🔥 → <b>${data.allocated_seats.join(", ")}</b>
                </div>`;
        }

    })
    .catch(error => {

        alert("Backend broke mama 😭");

        console.log(error);

    });
}

</script>

</body>
</html>
