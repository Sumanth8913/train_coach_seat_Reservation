<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Update Train</title>

<link rel="stylesheet" href="UserHome_Css.css">

<!-- ✅ Bootstrap 😏 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

    body {
        background: linear-gradient(135deg, #0f172a, #1e293b);
    }

    .update-box {
        width: 450px;
        margin: auto;
        margin-top: 50px;
        padding: 25px;
        border-radius: 15px;
        background-color: white;
    }

</style>

</head>

<body class="container">

<header>
    <h1 class="hd">National Ticket Booking Spot</h1>

    <div class="home"><p class="menu"><a href="AdminHome.html">Home</a></p></div>
    <div class="home"><p class="menu"><a href="UserViewTrains.html">View Trains</a></p></div>
    <div class="home"><p class="menu"><a href="AdminSearchTrain.html">Search Train</a></p></div>
    <div class="home"><p class="menu"><a href="AddTrains.html">Add Train</a></p></div>
    <div class="home"><p class="menu"><a href="CancleTrain.html">Delete Train</a></p></div>
    <div class="home"><p class="menu"><a href="AdminUpdateTrain.html">Update Train</a></p></div>
    <div class="home"><p class="menu"><a href="index.html">Logout</a></p></div>
</header>

<div class="card shadow update-box">

    <h3 class="text-center mb-3">✏️ Update Train</h3>

    <div class="mb-3">
        <label>Train Number</label>
        <input type="text" id="trainnumber" class="form-control">
    </div>

    <button class="btn btn-primary w-100 mb-3" onclick="loadTrain()">
        LOAD TRAIN 😏🔥
    </button>

    <div id="updateForm" style="display:none;">

        <div class="mb-2">
            <label>Train Name</label>
            <input type="text" id="trainname" class="form-control">
        </div>

        <div class="mb-2">
            <label>From Station</label>
            <input type="text" id="fromstation" class="form-control">
        </div>

        <div class="mb-2">
            <label>To Station</label>
            <input type="text" id="tostation" class="form-control">
        </div>

        <div class="mb-2">
            <label>Available Seats</label>
            <input type="text" id="available" class="form-control">
        </div>

        <div class="mb-3">
            <label>Fare</label>
            <input type="text" id="fare" class="form-control">
        </div>

        <button class="btn btn-success w-100" onclick="updateTrain()">
            UPDATE TRAIN 😈🔥
        </button>

    </div>

</div>

<script>

function loadTrain() {

    const trainnumber = document.getElementById("trainnumber").value;

    if (!trainnumber) {
        alert("Enter train number mama 😌");
        return;
    }

    fetch(`http://127.0.0.1:5000/search_train/${trainnumber}`)
    .then(res => res.json())
    .then(data => {

        if (data.status === "not_found") {

            alert("Train Not Found 😭");
            return;
        }

        document.getElementById("updateForm").style.display = "block";

        document.getElementById("trainname").value = data.trainname;
        document.getElementById("fromstation").value = data.fromstation;
        document.getElementById("tostation").value = data.tostation;
        document.getElementById("available").value = data.available;
        document.getElementById("fare").value = data.fare;

    });
}

function updateTrain() {

    const data = {
        trainnumber: document.getElementById("trainnumber").value,
        trainname: document.getElementById("trainname").value,
        fromstation: document.getElementById("fromstation").value,
        tostation: document.getElementById("tostation").value,
        available: document.getElementById("available").value,
        fare: document.getElementById("fare").value
    };

    fetch("http://127.0.0.1:5000/update_train", {

        method: "POST",

        headers: {
            "Content-Type": "application/json"
        },

        body: JSON.stringify(data)

    })
    .then(res => res.json())
    .then(response => {

        alert("Train Updated Successfully 😌🔥");

    })
    .catch(err => {

        alert("Backend broke mama 😭");
        console.log(err);

    });
}

</script>

</body>
</html>
