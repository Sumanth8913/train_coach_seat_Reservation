<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>User Registration</title>

<link rel="stylesheet" href="UserHome_Css.css">

<!-- ✅ Bootstrap 😏 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

    body {
        background: linear-gradient(135deg, #0f172a, #1e293b);
    }

    .register-box {
        width: 450px;
        margin: auto;
        margin-top: 40px;
        padding: 25px;
        border-radius: 15px;
        background-color: white;
    }

</style>

</head>

<body class="container">

<header>

    <h1 class="hd">National Ticket Booking Spot</h1>

    <div class="main">
        <span class="menu"><a href="UserLogin.html">Login as User</a></span>
        <span class="menu"><a href="UserRegister.html">New User Register</a></span>
        <span class="menu"><a href="AdminLogin.html">Login as Admin</a></span>
    </div>

</header>

<div class="card shadow register-box">

    <h3 class="text-center mb-3">📝 New User Registration</h3>

    <div class="mb-2">
        <label>Email</label>
        <input type="email" id="email" class="form-control">
    </div>

    <div class="mb-2">
        <label>Password</label>
        <input type="password" id="password" class="form-control">
    </div>

    <div class="mb-2">
        <label>First Name</label>
        <input type="text" id="firstname" class="form-control">
    </div>

    <div class="mb-2">
        <label>Last Name</label>
        <input type="text" id="lastname" class="form-control">
    </div>

    <div class="mb-2">
        <label>Address</label>
        <input type="text" id="address" class="form-control">
    </div>

    <div class="mb-2">
        <label>Phone Number</label>
        <input type="text" id="phone" class="form-control">
    </div>

    <div class="mb-3">
        <label>Photo</label>
        <input type="file" id="photo" class="form-control">
    </div>

    <button class="btn btn-success w-100" onclick="registerUser()">
        REGISTER 😏🔥
    </button>

</div>

<script>

function registerUser() {

    const data = {
        email: document.getElementById("email").value,
        password: document.getElementById("password").value,
        firstname: document.getElementById("firstname").value,
        lastname: document.getElementById("lastname").value,
        address: document.getElementById("address").value,
        phone: document.getElementById("phone").value
    };

    if (!data.email || !data.password || !data.firstname) {
        alert("Fill required fields mama 😌");
        return;
    }

    fetch("http://127.0.0.1:5000/register_user", {

        method: "POST",

        headers: {
            "Content-Type": "application/json"
        },

        body: JSON.stringify(data)

    })
    .then(res => res.json())
    .then(response => {

        alert("Registration Successful 😌🔥");

        window.location.href = "UserLogin.html";

    })
    .catch(err => {

        alert("Backend broke mama 😭");
        console.log(err);

    });
}

</script>

</body>
</html>
