<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Payment Gateway</title>

<link rel="stylesheet" href="UserHome_Css.css">

<!-- ✅ Bootstrap 5 (modern 😏) -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

    body {
        background: linear-gradient(135deg, #0f172a, #1e293b);
    }

    .payment-box {
        width: 420px;
        margin: auto;
        margin-top: 50px;
        padding: 25px;
        border-radius: 15px;
        background-color: white;
    }

    .card-icons img {
        width: 60px;
        margin: 5px;
    }

</style>

</head>

<body class="container">

<header>

    <h1 class="hd">National Ticket Booking Spot</h1>

    <div class="home"><p class="menu"><a href="UserHome.html">Home</a></p></div>
    <div class="home"><p class="menu"><a href="UserViewTrains.html">View Trains</a></p></div>
    <div class="home"><p class="menu"><a href="TrainBwStn.html">Trains Between Stations</a></p></div>
    <div class="home"><p class="menu"><a href="Availability.html">Seat Availability</a></p></div>
    <div class="home"><p class="menu"><a href="Fare.html">Fare Enquiry</a></p></div>
    <div class="home"><p class="menu"><a href="SearchTrains.html">Search Train</a></p></div>
    <div class="home"><p class="menu"><a href="index.html">Logout</a></p></div>

</header>

<div class="card shadow payment-box">

    <h3 class="text-center mb-3">💳 Payment Gateway</h3>

    <div class="text-center card-icons mb-3">
        <img src="https://cdn-icons-png.flaticon.com/512/196/196578.png">
        <img src="https://cdn-icons-png.flaticon.com/512/196/196561.png">
        <img src="https://cdn-icons-png.flaticon.com/512/888/888870.png">
    </div>

    <div class="mb-2">
        <label>Card Number</label>
        <input type="text" id="cardnumber" class="form-control">
    </div>

    <div class="mb-2">
        <label>Expiry Date</label>
        <input type="text" id="expiry" class="form-control" placeholder="MM/YY">
    </div>

    <div class="mb-2">
        <label>CVV</label>
        <input type="text" id="cvv" class="form-control">
    </div>

    <div class="mb-3">
        <label>Card Holder</label>
        <input type="text" id="holder" class="form-control">
    </div>

    <button class="btn btn-success w-100" onclick="processPayment()">
        Confirm Payment 😏🔥
    </button>

</div>

<div class="container mt-3">
    <div id="result"></div>
</div>

<script>

function processPayment() {

    const cardnumber = document.getElementById("cardnumber").value;
    const expiry = document.getElementById("expiry").value;
    const cvv = document.getElementById("cvv").value;
    const holder = document.getElementById("holder").value;

    if (!cardnumber || !expiry || !cvv || !holder) {
        alert("Fill all fields mama 😌");
        return;
    }

    // ✅ Fake payment simulation 😏🔥
    document.getElementById("result").innerHTML =
        "<div class='alert alert-success'>Payment Successful 😌🔥</div>";

    // Clear fields 😏
    document.getElementById("cardnumber").value = "";
    document.getElementById("expiry").value = "";
    document.getElementById("cvv").value = "";
    document.getElementById("holder").value = "";
}

</script>

</body>
</html>
